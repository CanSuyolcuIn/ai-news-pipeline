# Exa.ai ile aranacak sorgular
exa_queries:

  # --- Şirket Duyuruları (RSS'si olmayan) ---
  - query: "site:anthropic.com new model OR research OR product"
    category: model
  - query: "site:mistral.ai new model released"
    category: model
  - query: "site:cohere.com new model OR feature released"
    category: model

  # --- Model Duyuruları ---
  - query: "introducing new AI model released"
    category: model
  - query: "we are open sourcing new model"
    category: model
  - query: "open weight model released 2026"
    category: model
  - query: "multimodal model release announcing"
    category: model
  - query: "new reasoning model released"
    category: model
  - query: "new text to speech model released"
    category: model
  - query: "new vision language model released"
    category: model
  - query: "new embedding model released"
    category: model

  # --- Araştırma Yöntemleri ---
  - query: "new AI training method paper arxiv 2026"
    category: akademik
  - query: "new fine-tuning method LLM paper"
    category: akademik
  - query: "new RAG technique paper released"
    category: akademik
  - query: "new AI inference optimization technique"
    category: akademik

  # --- Framework / Araçlar ---
  - query: "new MCP server released open source"
    category: framework
  - query: "new AI agent framework released"
    category: framework
  - query: "new vector database feature released"
    category: framework

  # --- GitHub / Open Source ---
  - query: "site:github.com new AI model released 2026"
    category: github
  - query: "site:github.com new open source LLM"
    category: github

  # --- X / Twitter ---
  - query: "site:x.com introducing new AI model released"
    category: x_twitter
  - query: "site:x.com we are open sourcing model"
    category: x_twitter
  - query: "site:x.com new open source LLM released"
    category: x_twitter

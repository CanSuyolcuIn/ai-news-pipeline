name: AI News Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # Her gün 06:00 UTC (09:00 Türkiye)
  workflow_dispatch:      # Manuel tetikleme

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "EXA_API_KEY=${{ secrets.EXA_API_KEY }}" > pipeline/.env
          echo "OPENCODE_API_KEY=${{ secrets.OPENCODE_API_KEY }}" >> pipeline/.env
          echo "GMAIL_USER=${{ secrets.GMAIL_USER }}" >> pipeline/.env
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> pipeline/.env

      - name: Run pipeline
        working-directory: pipeline
        run: |
          python fetch.py
          python dedup.py
          python filter.py
          python summarize.py
          python format.py
          python notify.py

      - name: Set date
        id: date
        run: echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Upload bulletin
        uses: actions/upload-artifact@v4
        with:
          name: bulletin-${{ steps.date.outputs.today }}
          path: |
            pipeline/data/${{ steps.date.outputs.today }}/bulletin.md
            pipeline/data/${{ steps.date.outputs.today }}/bulletin.json
            pipeline/data/${{ steps.date.outputs.today }}/summary.json
            pipeline/data/${{ steps.date.outputs.today }}/output.json
          retention-days: 30

      - name: Commit published index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline/published_index.json
          git diff --staged --quiet || git commit -m "chore: update published index [${{ steps.date.outputs.today }}]"
          git push
